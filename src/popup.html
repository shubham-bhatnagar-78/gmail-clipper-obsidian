<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Gmail Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="clipper-root">
    <!-- Header bar -->
    <div class="clipper-header">
      <div class="template-selector">
        <select id="template-select">
          <option value="default">Default</option>
        </select>
      </div>
      <div class="header-actions">
        <button id="btn-refresh" class="icon-btn" title="Re-extract">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.42-8.33L1 10"/></svg>
        </button>
        <button id="btn-more" class="icon-btn" title="More options">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <!-- Status -->
    <div id="status-bar" class="status-bar hidden">
      <span id="status-text" class="status-text"></span>
    </div>

    <!-- Not on Gmail -->
    <div id="not-gmail" class="state-view hidden">
      <p>Open an email in Gmail to clip it.</p>
    </div>

    <!-- No email open -->
    <div id="no-email" class="state-view hidden">
      <p>Open or expand an email to clip it.</p>
    </div>

    <!-- Vault setup -->
    <div id="vault-setup" class="vault-setup hidden">
      <p class="setup-title">Set your Obsidian vault</p>
      <div class="form-group">
        <input type="text" id="vault-name-quick" placeholder="Vault name">
      </div>
      <div class="form-group">
        <input type="text" id="folder-path-quick" placeholder="Folder (default: Emails)">
      </div>
      <button id="btn-save-vault" class="btn-accent">Save & Continue</button>
    </div>

    <!-- Clipper form -->
    <div id="clip-form" class="clip-form hidden">
      <!-- Note name (large, editable) -->
      <div class="note-name-area">
        <textarea id="note-name" rows="2" placeholder="Note name"></textarea>
      </div>

      <!-- Properties -->
      <div class="properties-section">
        <button id="toggle-properties" class="section-toggle">
          <span>Properties</span>
          <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div id="properties-list" class="properties-list">
          <!-- Populated dynamically -->
        </div>
      </div>

      <!-- Content preview -->
      <div id="content-preview" class="content-preview">
        <!-- Rendered markdown preview -->
      </div>

      <!-- Footer: folder + clip button -->
      <div class="clip-footer">
        <div class="folder-selector">
          <input type="text" id="folder-path" placeholder="Clippings">
        </div>
        <div class="clip-button-group">
          <button id="btn-clip" class="btn-accent btn-clip">Add to Obsidian</button>
          <button id="btn-clip-dropdown" class="btn-accent btn-clip-dropdown" title="More options">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
      </div>

      <!-- Dropdown menu for clip options -->
      <div id="clip-dropdown-menu" class="dropdown-menu hidden">
        <button class="dropdown-item" data-method="obsidian-uri">Add to Obsidian</button>
        <button class="dropdown-item" data-method="clipboard">Copy to clipboard</button>
        <button class="dropdown-item" data-method="file-download">Download .md file</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
