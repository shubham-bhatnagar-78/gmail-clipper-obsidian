<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gmail Clipper Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <header class="settings-header">
      <h1>Gmail Clipper Settings</h1>
      <p class="subtitle">Configure how emails are clipped to Obsidian</p>
    </header>

    <!-- General -->
    <section class="settings-section">
      <h2>General</h2>

      <div class="setting-item">
        <label for="vault-name">Vault name</label>
        <p class="setting-desc">Leave empty to use your default vault</p>
        <input type="text" id="vault-name" placeholder="My Vault">
      </div>

      <div class="setting-item">
        <label for="folder-path">Folder path</label>
        <p class="setting-desc">Where clipped emails will be saved</p>
        <input type="text" id="folder-path" placeholder="Emails">
      </div>

      <div class="setting-item">
        <label for="filename-template">Filename template</label>
        <p class="setting-desc">Variables: {{subject}}, {{from_name}}, {{date}}</p>
        <input type="text" id="filename-template" placeholder="{{subject}}">
      </div>

      <div class="setting-item">
        <label for="date-format">Date format</label>
        <input type="text" id="date-format" placeholder="YYYY-MM-DD HH:mm">
      </div>
    </section>

    <!-- Delivery -->
    <section class="settings-section">
      <h2>Delivery method</h2>

      <div class="setting-item">
        <label for="delivery-method">How to send to Obsidian</label>
        <select id="delivery-method">
          <option value="obsidian-uri">Obsidian URI (recommended)</option>
          <option value="clipboard">Copy to clipboard</option>
          <option value="file-download">Download .md file</option>
        </select>
      </div>
    </section>

    <!-- Content -->
    <section class="settings-section">
      <h2>Content</h2>

      <div class="setting-item">
        <label class="checkbox-label">
          <input type="checkbox" id="include-attachments" checked>
          <span>Include attachment list</span>
        </label>
      </div>

      <div class="setting-item">
        <label for="image-handling">Image handling</label>
        <select id="image-handling">
          <option value="link">Keep as links</option>
          <option value="skip">Skip images</option>
        </select>
      </div>

      <div class="setting-item">
        <label for="thread-separator">Thread separator</label>
        <input type="text" id="thread-separator" placeholder="---">
      </div>
    </section>

    <!-- Properties -->
    <section class="settings-section">
      <h2>Properties</h2>
      <p class="setting-desc">YAML frontmatter properties added to each note</p>
      <div id="properties-editor">
        <!-- Populated dynamically -->
      </div>
      <button id="add-property" class="btn-secondary">+ Add property</button>
    </section>

    <!-- Actions -->
    <div class="settings-actions">
      <button id="btn-save" class="btn-primary">Save settings</button>
      <button id="btn-reset" class="btn-secondary">Reset to defaults</button>
    </div>

    <div id="save-status" class="save-status hidden"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
